name: 📝 Commit Message Validation

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
      - staging
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  validate-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          echo "Fetching commits to validate..."
          echo ""

          # Determine which commits to check
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            COMMITS=$(git log --format="%H|||%s" "${BASE_SHA}".."${HEAD_SHA}")
          else
            # On push, check only the commits in this push
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            if [ "$BEFORE" == "0000000000000000000000000000000000000000" ]; then
              # New branch — check only the latest commit
              COMMITS=$(git log --format="%H|||%s" -1)
            else
              COMMITS=$(git log --format="%H|||%s" "${BEFORE}".."${AFTER}")
            fi
          fi

          if [ -z "$COMMITS" ]; then
            echo "✅ No commits to validate."
            exit 0
          fi

          FAILED=0
          TOTAL=0
          PASSED=0

          while IFS= read -r line; do
            [ -z "$line" ] && continue

            HASH=$(echo "$line" | cut -d'|' -f1)
            MSG=$(echo "$line" | cut -d'|' -f4-)
            SHORT="${HASH:0:7}"
            TOTAL=$((TOTAL + 1))

            echo "──────────────────────────────────────────────"
            echo "Commit: [$SHORT]"
            echo "Message: \"$MSG\""
            echo ""

            COMMIT_FAILED=0

            # Skip merge commits
            if echo "$MSG" | grep -qE '^Merge (branch|pull request|remote-tracking)'; then
              echo "  ⏭️  Merge commit — skipping."
              PASSED=$((PASSED + 1))
              continue
            fi

            # Skip revert commits
            if echo "$MSG" | grep -qE '^Revert "'; then
              echo "  ⏭️  Revert commit — skipping."
              PASSED=$((PASSED + 1))
              continue
            fi

            # Rule 1: Must contain a Linear ticket ID (e.g., ENG-123)
            if ! echo "$MSG" | grep -qE '\b[A-Z]+-[0-9]+\b'; then
              echo "  ❌ Missing Linear ticket ID (e.g., ENG-123, PROJ-456)"
              COMMIT_FAILED=1
            else
              TICKET=$(echo "$MSG" | grep -oE '\b[A-Z]+-[0-9]+\b' | head -1)
              echo "  ✅ Linear ticket ID found: $TICKET"
            fi

            # Rule 2: Must contain [skip ci]
            if ! echo "$MSG" | grep -qiE '\[skip ci\]'; then
              echo "  ❌ Missing [skip ci] tag"
              COMMIT_FAILED=1
            else
              echo "  ✅ [skip ci] found"
            fi

            if [ "$COMMIT_FAILED" -eq 1 ]; then
              FAILED=$((FAILED + 1))
            else
              PASSED=$((PASSED + 1))
            fi

          done <<< "$COMMITS"

          echo "══════════════════════════════════════════════"
          echo "Results: $PASSED passed, $FAILED failed (of $TOTAL commits)"
          echo ""

          if [ "$FAILED" -gt 0 ]; then
            echo "❌ Commit message validation FAILED"
            echo ""
            echo "Required format:"
            echo "  <type>(<ticket-id>): <description> [skip ci]"
            echo ""
            echo "Examples:"
            echo "  feat(ENG-123): add OAuth login flow [skip ci]"
            echo "  fix(PROJ-456): resolve null pointer on checkout [skip ci]"
            echo "  chore(ENG-789): update dependencies [skip ci]"
            echo "  docs(ENG-101): update README with setup steps [skip ci]"
            exit 1
          fi

          echo "✅ All commit messages are valid!"
