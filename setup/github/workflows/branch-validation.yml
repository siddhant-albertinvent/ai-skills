name: 🌿 Branch Name Validation

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
      - integration
      - dev
      - staging
      - qa
      - merge**
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  validate-branch:
    name: Validate Branch Name
    runs-on: ubuntu-latest

    steps:
      - name: Extract branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          echo "Branch to validate: $BRANCH"

      - name: Validate branch name
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"

          # Skip protected branches
          PROTECTED_PATTERN='^(main|master|develop|integration|dev|staging|qa|release/.*|merge.*)$'
          if echo "$BRANCH" | grep -qE "$PROTECTED_PATTERN"; then
            echo "✅ Protected branch '$BRANCH' — skipping validation."
            exit 0
          fi

          # Enforce naming convention
          # feat/<TICKET-ID>-<short-desc>
          # bug/<TICKET-ID>-<short-desc>
          # hotfix/<TICKET-ID>-<short-desc>
          VALID_PATTERN='^(feat|bug|hotfix)/[A-Z]+-[0-9]+-[a-z0-9][a-z0-9-]*$'

          if echo "$BRANCH" | grep -qE "$VALID_PATTERN"; then
            echo "✅ Branch name '$BRANCH' is valid."
            exit 0
          fi

          echo "❌ Branch name '$BRANCH' does not follow naming conventions."
          echo ""
          echo "Required format:"
          echo "  feat/<ticketId>-<short-desc>     → e.g. feat/ENG-123-add-oauth-login"
          echo "  bug/<ticketId>-<short-desc>       → e.g. bug/PROJ-456-fix-checkout"
          echo "  hotfix/<ticketId>-<short-desc>   → e.g. hotfix/ENG-789-patch-crash"
          echo ""
          echo "Rules:"
          echo "  • Prefix: feat, bug, or hotfix (lowercase)"
          echo "  • Ticket ID: UPPERCASE letters + hyphen + number (e.g. ENG-123)"
          echo "  • Description: lowercase, hyphen-separated, no spaces"
          exit 1
